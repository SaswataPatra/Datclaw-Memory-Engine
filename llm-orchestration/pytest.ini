[pytest]
# Pytest configuration for LLM Orchestration Service

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests requiring full Docker stack
    slow: Slow-running tests
    requires_redis: Tests requiring Redis connection
    requires_arango: Tests requiring ArangoDB connection
    requires_qdrant: Tests requiring Qdrant connection

# Asyncio mode
asyncio_mode = auto

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --timeout=10
    --timeout-method=thread
    
# Coverage options (when running with --cov)
[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

